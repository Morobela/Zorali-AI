services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - ollama
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./:/workspace:ro

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zorali
      POSTGRES_PASSWORD: zorali
      POSTGRES_DB: zorali_ai
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  ollama_data:
  pg_data:
  redis_data:

services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./:/workspace:ro

  frontend:
    build: ./frontend
    environment:
      VITE_API_TARGET: http://backend:8000
      VITE_WS_TARGET: ws://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zorali
      POSTGRES_PASSWORD: zorali
      POSTGRES_DB: zorali_ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zorali -d zorali_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  ollama_data:
  pg_data:
  redis_data:

services:
  backend:
    build: ./backend
    env_file: .env
    # Dev only: the image runs as a non-root user, but the source/data bind
    # mounts below are host-owned — run as root here so hot reload and /data
    # writes work. The prod stack (named volume, no bind mounts) stays non-root.
    user: "0:0"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./:/workspace:ro

  # Development frontend: Vite dev server with hot reload. The frontend
  # Dockerfile is now a production (nginx) build — see docker-compose.prod.yml.
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_TARGET: http://backend:8000
      VITE_WS_TARGET: ws://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zorali
      POSTGRES_PASSWORD: zorali
      POSTGRES_DB: zorali_ai
    # Published for host-side migrations, tests and seed_admin.py (dev only).
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zorali -d zorali_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  redis:
    image: redis:7-alpine
    # Published for host-side tests (dev only) — the WS ticket store needs a
    # reachable Redis. The prod compose keeps Redis internal-only.
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  ollama_data:
  pg_data:
  redis_data:
